<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>设备运行时接口控制台</title>
  <style>
    :root {
      --bg: #eef3f1;
      --surface: #ffffff;
      --surface-soft: #f8faf9;
      --line: #dfe8e5;
      --line-strong: #c8d6d2;
      --ink: #0f172a;
      --muted: #64748b;
      --teal: #14b8a6;
      --teal-deep: #0f766e;
      --teal-soft: #f0fdfa;
      --red: #b91c1c;
      --red-soft: #fef2f2;
      --amber: #b45309;
      --amber-soft: #fffbeb;
      --green: #047857;
      --green-soft: #ecfdf5;
      --mono: Consolas, "SFMono-Regular", Monaco, ui-monospace, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font: 14px/1.5 var(--sans);
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .56; }
    a { color: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 360px) minmax(180px, 260px) auto auto;
      gap: 12px;
      align-items: end;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(8px);
    }
    .brand h1 { margin: 0; font-size: 18px; line-height: 1.25; }
    .brand p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
    .field { display: grid; gap: 5px; }
    .field label { color: #334155; font-size: 12px; font-weight: 600; }
    .input, .textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .input { min-height: 38px; padding: 8px 10px; }
    .textarea { min-height: 96px; padding: 10px; resize: vertical; }
    .input:focus, .textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(20, 184, 166, .14); }
    .mono { font-family: var(--mono); }

    .button {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--teal);
      border-radius: 8px;
      background: var(--teal);
      color: #fff;
      font-weight: 700;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }
    .button:hover { background: var(--teal-deep); border-color: var(--teal-deep); }
    .button:active { transform: translateY(1px); }
    .button.secondary { background: #fff; color: var(--teal-deep); border-color: var(--line-strong); }
    .button.secondary:hover { background: var(--teal-soft); border-color: var(--teal); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
    }
    .status-pill::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .status-pill.ok { color: var(--green); background: var(--green-soft); border-color: #bbf7d0; }
    .status-pill.ok::before { background: var(--green); }
    .status-pill.warn { color: var(--amber); background: var(--amber-soft); border-color: #fde68a; }
    .status-pill.warn::before { background: var(--amber); }
    .status-pill.error { color: var(--red); background: var(--red-soft); border-color: #fecaca; }
    .status-pill.error::before { background: var(--red); }

    .layout {
      display: grid;
      grid-template-columns: 244px minmax(0, 1fr) minmax(340px, 430px);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 67px);
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .side, .request-panel { position: sticky; top: 82px; height: calc(100vh - 96px); overflow: auto; }
    .side { padding: 12px; }
    .section-title { margin: 0 0 8px; color: var(--muted); font-size: 12px; font-weight: 700; }
    .nav { display: grid; gap: 4px; }
    .nav button {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: #334155;
      text-align: left;
    }
    .nav button:hover { background: var(--surface-soft); border-color: var(--line); }
    .nav button.active { background: var(--teal-soft); border-color: #99f6e4; color: var(--teal-deep); font-weight: 700; }
    .method { font: 11px/1 var(--mono); padding: 4px 6px; border-radius: 6px; background: var(--surface-soft); color: var(--muted); }
    .method.post { color: #92400e; background: #fffbeb; }
    .method.ws { color: #334155; background: #f1f5f9; }

    .content { overflow: hidden; }
    .content-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; padding: 18px; border-bottom: 1px solid var(--line); }
    .content-head h2 { margin: 0; font-size: 20px; line-height: 1.3; }
    .content-head p { margin: 4px 0 0; max-width: 74ch; color: var(--muted); }
    .content-body { padding: 18px; display: grid; gap: 14px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .card { border: 1px solid var(--line); border-radius: 12px; background: var(--surface-soft); padding: 12px; min-width: 0; }
    .card h3 { margin: 0 0 8px; font-size: 14px; }
    .kv { display: grid; gap: 8px; }
    .kv-row { display: grid; grid-template-columns: 120px minmax(0, 1fr); gap: 10px; align-items: start; }
    .kv-row span:first-child { color: var(--muted); }
    .code-chip { display: inline-block; max-width: 100%; overflow-wrap: anywhere; padding: 2px 6px; border-radius: 6px; background: #f1f5f9; color: #0f172a; font-family: var(--mono); font-size: 12px; }
    .empty { padding: 24px; border: 1px dashed var(--line-strong); border-radius: 12px; background: var(--surface-soft); color: var(--muted); text-align: center; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { background: var(--surface-soft); color: #334155; font-size: 12px; }
    tr:last-child td { border-bottom: 0; }
    img.preview, video.preview { width: 100%; max-height: 180px; object-fit: contain; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    audio { width: 100%; }

    .request-panel { display: grid; grid-template-rows: auto minmax(0, 1fr); }
    .request-head { padding: 16px; border-bottom: 1px solid var(--line); }
    .request-head h2 { margin: 0; font-size: 16px; }
    .request-head p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .request-body { padding: 14px; overflow: auto; display: grid; gap: 12px; align-content: start; }
    .detail-block { display: grid; gap: 7px; }
    .detail-block strong { font-size: 12px; color: #334155; }
    pre {
      margin: 0;
      max-height: 320px;
      overflow: auto;
      padding: 11px;
      border-radius: 10px;
      background: #0f172a;
      color: #e2e8f0;
      font: 12px/1.55 var(--mono);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .note { padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface-soft); color: #334155; font-size: 12px; }
    .note.warn { border-color: #fde68a; background: var(--amber-soft); color: #92400e; }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 220px minmax(0, 1fr); }
      .request-panel { position: static; grid-column: 1 / -1; height: auto; max-height: none; }
    }
    @media (max-width: 760px) {
      .topbar { position: static; grid-template-columns: 1fr; align-items: stretch; }
      .layout { grid-template-columns: 1fr; padding: 10px; }
      .side { position: static; height: auto; }
      .nav { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
      .content-head { display: grid; }
      .kv-row { grid-template-columns: 1fr; gap: 3px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>设备运行时接口控制台</h1>
      <p>HTTP 接口统一使用 X-Device-Code，请求体只放业务参数；WebSocket 命令在 payload 中携带 deviceCode。</p>
    </div>
    <div class="field">
      <label for="apiBaseInput">API Base URL</label>
      <input id="apiBaseInput" class="input mono" autocomplete="off" />
    </div>
    <div class="field">
      <label for="deviceCodeInput">X-Device-Code</label>
      <input id="deviceCodeInput" class="input mono" placeholder="DEVICE_001" autocomplete="off" />
    </div>
    <button id="connectButton" class="button" type="button">确认并拉取</button>
    <span id="statusPill" class="status-pill">未连接</span>
  </header>

  <main class="layout">
    <aside class="panel side">
      <p class="section-title">运行时数据</p>
      <nav class="nav" aria-label="接口菜单">
        <button class="active" type="button" data-section="device"><span>设备与公司</span><span class="method">GET</span></button>
        <button type="button" data-section="application"><span>应用</span><span class="method post">POST</span></button>
        <button type="button" data-section="voiceTones"><span>获取音色列表</span><span class="method">GET</span></button>
        <button type="button" data-section="images"><span>获取背景图片</span><span class="method post">POST</span></button>
        <button type="button" data-section="scrollingTexts"><span>获取滚动文本</span><span class="method post">POST</span></button>
        <button type="button" data-section="models"><span>获取数字人模型</span><span class="method post">POST</span></button>
        <button type="button" data-section="videos"><span>获取视频</span><span class="method post">POST</span></button>
      </nav>
      <p class="section-title" style="margin-top:18px">能力测试</p>
      <nav class="nav" aria-label="能力测试菜单">
        <button type="button" data-section="asr"><span>ASR WebSocket</span><span class="method ws">WS</span></button>
        <button type="button" data-section="llmWs"><span>LLM WebSocket</span><span class="method ws">WS</span></button>
        <button type="button" data-section="ttsWs"><span>TTS WebSocket</span><span class="method ws">WS</span></button>
        <button type="button" data-section="agentChat"><span>智能体问答</span><span class="method ws">WS</span></button>
        <button type="button" data-section="ttsHttp"><span>TTS HTTP</span><span class="method post">POST</span></button>
      </nav>
    </aside>

    <section class="panel content">
      <div class="content-head">
        <div>
          <h2 id="sectionTitle">设备与公司</h2>
          <p id="sectionDescription">输入设备码后，页面会先上报设备，再拉取运行时配置。</p>
        </div>
        <button id="refreshButton" class="button secondary" type="button">刷新运行时配置</button>
      </div>
      <div id="contentBody" class="content-body"></div>
    </section>

    <aside class="panel request-panel">
      <div class="request-head">
        <h2>请求接口</h2>
        <p>Swagger 风格展示真实请求方式、接口路径、请求头/体和返回结果。</p>
      </div>
      <div class="request-body">
        <div class="detail-block"><strong>接口说明</strong><div id="requestNote" class="note">等待选择接口。</div></div>
        <div class="detail-block"><strong>Method / Path</strong><pre id="requestLine">-</pre></div>
        <div class="detail-block"><strong>Headers</strong><pre id="requestHeaders">{}</pre></div>
        <div class="detail-block"><strong>Body</strong><pre id="requestBody">null</pre></div>
        <div class="detail-block"><strong>Response</strong><pre id="responseBody">等待请求</pre></div>
      </div>
    </aside>
  </main>

  <script>
    (function () {
      'use strict';

      const DEFAULT_API_BASE = location.protocol === 'file:' ? 'http://localhost:8880/api/v1' : location.origin + '/api/v1';
      const CONFIG = {
        deviceCodeHeader: 'X-Device-Code',
        requestIdHeader: 'X-Request-ID',
        traceIdHeader: 'X-Trace-ID',
      };
      const query = new URLSearchParams(location.search);
      const state = {
        apiBaseUrl: normalizeApiBase(query.get('apiBaseUrl') || DEFAULT_API_BASE),
        deviceCode: query.get('deviceCode') || query.get('device_code') || '',
        activation: null,
        runtimeConfig: null,
        ttsOptions: null,
        resourceSlices: {},
        asrRecorder: null,
        agentRecorder: null,
        ttsPlaybackContext: null,
        activeSection: 'device',
        lastRequest: null,
        sockets: [],
      };

      const els = {
        apiBaseInput: document.getElementById('apiBaseInput'),
        deviceCodeInput: document.getElementById('deviceCodeInput'),
        connectButton: document.getElementById('connectButton'),
        refreshButton: document.getElementById('refreshButton'),
        statusPill: document.getElementById('statusPill'),
        sectionTitle: document.getElementById('sectionTitle'),
        sectionDescription: document.getElementById('sectionDescription'),
        contentBody: document.getElementById('contentBody'),
        requestNote: document.getElementById('requestNote'),
        requestLine: document.getElementById('requestLine'),
        requestHeaders: document.getElementById('requestHeaders'),
        requestBody: document.getElementById('requestBody'),
        responseBody: document.getElementById('responseBody'),
        navButtons: Array.from(document.querySelectorAll('[data-section]')),
      };

      const sections = {
        device: { title: '设备与公司', description: '展示 device.tenantName、expiresAt、授权状态和设备绑定信息。' },
        application: { title: '应用', description: '通过设备码读取资源应用与完整智能体配置，包括开场白、建议问题和语音播报开关。' },
        voiceTones: { title: '获取音色列表', description: '通过固定设备码读取 /ai-models/tts/options/ 返回的 TTS 音色列表，并可直接测试合成。' },
        images: { title: '获取背景图片', description: '通过固定设备码读取当前公司在资源管理/背景图片管理维护的数据。' },
        scrollingTexts: { title: '获取滚动文本', description: '通过固定设备码读取当前公司在资源管理/滚动文本维护的数据。' },
        models: { title: '获取数字人模型', description: '通过固定设备码读取当前公司在资源管理/模型管理维护的数据。' },
        videos: { title: '获取视频', description: '通过固定设备码读取当前公司在资源管理/视频管理维护的数据。' },
        asr: { title: 'ASR WebSocket', description: '先检查 ASR 设备状态，再用统一 /ws/realtime/ 发送 asr.session.start，并通过麦克风推送 16k PCM 分片。' },
        llmWs: { title: 'LLM WebSocket', description: '统一 /ws/realtime/ 的 llm.session.start，按设备码找到绑定智能体，流式返回 llm.delta，完成返回 llm.done。' },
        ttsWs: { title: 'TTS WebSocket', description: '统一 /ws/realtime/ 支持 tts.session.start，按 type 返回 ready、audio/pcm 二进制分片和 done。' },
        agentChat: { title: '智能体问答', description: '麦克风 ASR 实时显示问题，停止后进入 LLM，并按开关控制 TTS 回复自动播放。' },
        ttsHttp: { title: 'TTS HTTP', description: '设备码免登录 TTS 入口：POST /ai-models/tts/runtime/。' },
      };

      init();

      function init() {
        els.apiBaseInput.value = state.apiBaseUrl;
        els.deviceCodeInput.value = state.deviceCode;
        bindEvents();
        renderActiveSection();
        if (state.deviceCode) connectDevice().catch(showError);
      }

      function bindEvents() {
        els.connectButton.addEventListener('click', () => connectDevice().catch(showError));
        els.refreshButton.addEventListener('click', () => fetchRuntimeConfig().then(renderActiveSection).catch(showError));
        els.deviceCodeInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') connectDevice().catch(showError);
        });
        for (const button of els.navButtons) {
          button.addEventListener('click', () => {
            state.activeSection = button.dataset.section;
            renderActiveSection();
          });
        }
      }

      async function connectDevice() {
        state.apiBaseUrl = normalizeApiBase(els.apiBaseInput.value || DEFAULT_API_BASE);
        state.deviceCode = els.deviceCodeInput.value.trim();
        els.apiBaseInput.value = state.apiBaseUrl;
        if (!state.deviceCode) throw new Error('请输入设备码');
        setStatus('正在上报设备...', 'warn');
        const body = {
          softwareVersion: 'runtime-api-console-html',
          systemVersion: navigator.userAgent || '',
          mainboardInfo: 'browser',
          deviceInfo: {
            source: 'runtime-api-console',
            pageUrl: location.href,
            language: navigator.language || '',
          },
        };
        state.activation = unwrap(await apiRequest('/device-auth/activate/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        }, '设备上报与绑定检查'));

        if (state.activation.bindingStatus !== 'bound') {
          state.runtimeConfig = null;
          setStatus('设备待绑定', 'warn');
          renderActiveSection();
          return;
        }
        await fetchRuntimeConfig();
        setStatus('设备已连接', 'ok');
        renderActiveSection();
      }

      async function fetchRuntimeConfig() {
        if (!state.deviceCode) throw new Error('请输入设备码');
        setStatus('正在拉取运行时配置...', 'warn');
        const path = '/device-runtime/config/';
        state.runtimeConfig = unwrap(await apiRequest(path, { method: 'GET' }, '运行时配置'));
        setStatus('运行时配置已更新', 'ok');
        return state.runtimeConfig;
      }

      async function apiRequest(path, options, label) {
        const requestIds = makeRequestIds();
        const method = (options.method || 'GET').toUpperCase();
        const headers = Object.assign({
          [CONFIG.deviceCodeHeader]: state.deviceCode,
          [CONFIG.requestIdHeader]: requestIds.requestId,
          [CONFIG.traceIdHeader]: requestIds.traceId,
        }, options.headers || {});
        const url = state.apiBaseUrl + path;
        writeRequestDetail({ label, method, url, path, headers, body: options.body || null, note: endpointNote(path) });
        let response;
        try {
          response = await fetch(url, {
            method,
            headers,
            body: options.body,
            credentials: 'omit',
          });
        } catch (error) {
          const message = '网络请求失败：' + (error && error.message ? error.message : String(error));
          writeResponse({ ok: false, status: 0, message });
          throw new Error(message);
        }
        const contentType = response.headers.get('content-type') || '';
        let body;
        if (contentType.includes('application/json')) {
          body = await response.json();
        } else if (contentType.startsWith('audio/') || contentType.includes('octet-stream')) {
          body = await response.blob();
        } else {
          body = await response.text();
        }
        const result = { ok: response.ok, status: response.status, statusText: response.statusText, contentType, body };
        writeResponse(result);
        if (!response.ok) throw new Error(extractErrorMessage(body, response.status));
        return result;
      }

      function renderActiveSection() {
        for (const button of els.navButtons) button.classList.toggle('active', button.dataset.section === state.activeSection);
        const meta = sections[state.activeSection] || sections.device;
        els.sectionTitle.textContent = meta.title;
        els.sectionDescription.textContent = meta.description;
        if (state.activeSection === 'asr') return renderAsr();
        if (state.activeSection === 'llmWs') return renderLlmWs();
        if (state.activeSection === 'agentChat') return renderAgentChat();
        if (state.activeSection === 'ttsWs') return renderTtsWs();
        if (state.activeSection === 'ttsHttp') return renderTtsHttp();
        if (!state.activation && !state.runtimeConfig) {
          renderEmpty('请输入设备码并点击“确认并拉取”。');
          writeResourceSliceDetail(state.activeSection);
          return;
        }
        if (state.activeSection === 'device') return renderDevice();
        if (state.activeSection === 'application') return fetchResourceSlice('application').then(renderApplication).catch(showError);
        if (state.activeSection === 'voiceTones') return fetchTtsOptions().then(renderVoiceTones).catch(showError);
        if (state.activeSection === 'images') return fetchResourceSlice('images').then(() => renderResourceCards('images')).catch(showError);
        if (state.activeSection === 'scrollingTexts') return fetchResourceSlice('scrollingTexts').then(renderScrollingTexts).catch(showError);
        if (state.activeSection === 'models') return fetchResourceSlice('models').then(() => renderResourceCards('models')).catch(showError);
        if (state.activeSection === 'videos') return fetchResourceSlice('videos').then(() => renderResourceCards('videos')).catch(showError);
      }

      async function fetchResourceSlice(type) {
        if (!state.deviceCode) throw new Error('请输入设备码');
        setStatus('正在拉取 ' + type + '...', 'warn');
        const result = unwrap(await apiRequest('/device-runtime/resources/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resourceType: type }),
        }, '设备码资源切片'));
        state.resourceSlices[type] = result;
        if (type === 'application') {
          state.runtimeConfig = Object.assign({}, state.runtimeConfig || {}, {
            device: result.device,
            application: result.application,
            agentApplication: result.agentApplication,
            resources: result.resources || (state.runtimeConfig && state.runtimeConfig.resources) || {},
          });
        }
        setStatus('资源已更新', 'ok');
        return result;
      }

      async function fetchTtsOptions() {
        if (!state.deviceCode) throw new Error('请输入设备码');
        setStatus('正在拉取 TTS 音色...', 'warn');
        const result = unwrap(await apiRequest('/ai-models/tts/options/', { method: 'GET' }, 'TTS 音色列表'));
        state.ttsOptions = result;
        state.resourceSlices.voiceTones = Object.assign({}, result, {
          resourceType: 'voiceTones',

      async function startAsrMicTest() {
        const output = document.getElementById('asrOutput');
        const startButton = document.getElementById('asrMicStartBtn');
        const stopButton = document.getElementById('asrMicStopBtn');
        if (!state.deviceCode) return showError(new Error('请输入设备码'));
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return showError(new Error('当前浏览器不支持麦克风录音'));
        stopAsrMicTest({ silent: true });
        const requestIds = makeRequestIds();
        const sessionId = 'asr-session-' + Date.now();
        const command = { type: 'asr.session.start', id: sessionId, payload: { deviceCode: state.deviceCode, requestId: requestIds.requestId, traceId: requestIds.traceId } };
        const events = [{ type: 'client.microphone.requesting' }];
        output.textContent = pretty(events);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
          const socket = new WebSocket(realtimeWsUrl());
          state.sockets.push(socket);
          state.asrRecorder = { socket, stream, sessionId, output, events, started: false, chunks: 0, audioContext: null, source: null, processor: null };
          startButton.disabled = true;
          stopButton.disabled = false;
          writeRequestDetail({ label: 'ASR WebSocket 麦克风流式测试', method: 'WS', url: realtimeWsUrl(), path: '/ws/realtime/', headers: {}, body: command, note: '收到 asr.ready 后开始推送麦克风 16k mono pcm_s16le 二进制分片；点击停止会发送 asr.session.finish。' });

          socket.addEventListener('open', () => {
            socket.send(JSON.stringify(command));
            events.push({ type: 'client.sent', command: command.type, id: sessionId });
            output.textContent = pretty(events);
          });
          socket.addEventListener('message', (event) => {
            const payload = parseJson(event.data) || event.data;
            events.push(payload);
            output.textContent = pretty(events);
            writeResponse({ ok: true, status: 'WS', body: events });
            const eventType = payload && payload.type;
            if (eventType === 'asr.transcript') updateAsrTranscriptSummary(payload);
            if (eventType === 'asr.ready') startMicrophonePcmPump(state.asrRecorder);
            if (String(eventType).includes('completed') || String(eventType).includes('finished') || eventType === 'asr.error') {
              stopAsrMicTest({ closeSocket: eventType === 'asr.error', skipFinish: true, silent: true });
            }
          });
          socket.addEventListener('error', () => {
            events.push({ type: 'client.error', message: 'WebSocket 连接失败' });
            output.textContent = pretty(events);
            stopAsrMicTest({ closeSocket: true, silent: true });
          });
          socket.addEventListener('close', () => {
            events.push({ type: 'client.close' });
            output.textContent = pretty(events);
            stopAsrMicTest({ silent: true });
          });
        } catch (error) {
          startButton.disabled = false;
          stopButton.disabled = true;
          output.textContent = error.message;
        }
      }

      function startMicrophonePcmPump(recorder) {
        if (!recorder || recorder.started) return;
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        recorder.audioContext = new AudioContextCtor();
        recorder.source = recorder.audioContext.createMediaStreamSource(recorder.stream);
        recorder.processor = recorder.audioContext.createScriptProcessor(4096, 1, 1);
        recorder.processor.onaudioprocess = (event) => {
          if (!recorder.started || !recorder.socket || recorder.socket.readyState !== WebSocket.OPEN) return;
          const pcm = floatTo16kPcm(event.inputBuffer.getChannelData(0), recorder.audioContext.sampleRate);
          if (!pcm.byteLength) return;
          recorder.socket.send(pcm);
          recorder.chunks += 1;
        };
        recorder.source.connect(recorder.processor);
        recorder.processor.connect(recorder.audioContext.destination);
        recorder.started = true;
        recorder.events.push({ type: 'client.microphone.started', inputSampleRate: recorder.audioContext.sampleRate, outputSampleRate: 16000, format: 'pcm_s16le' });
        recorder.output.textContent = pretty(recorder.events);
      }

      function stopAsrMicTest(options) {
        const recorder = state.asrRecorder;
        if (!recorder) return;
        const opts = options || {};
        recorder.started = false;
        if (recorder.processor) recorder.processor.disconnect();
        if (recorder.source) recorder.source.disconnect();
        if (recorder.audioContext) recorder.audioContext.close().catch(function () {});
        if (recorder.stream) recorder.stream.getTracks().forEach((track) => track.stop());
        if (recorder.socket && recorder.socket.readyState === WebSocket.OPEN && !opts.closeSocket && !opts.skipFinish) {
          recorder.socket.send(JSON.stringify({ type: 'asr.session.finish', id: recorder.sessionId }));
          recorder.events.push({ type: 'client.sent', command: 'asr.session.finish', chunks: recorder.chunks });
        } else if (recorder.socket && opts.closeSocket) {
          recorder.socket.close();
        }
        const startButton = document.getElementById('asrMicStartBtn');
        const stopButton = document.getElementById('asrMicStopBtn');
        if (startButton) startButton.disabled = false;
        if (stopButton) stopButton.disabled = true;
        if (!opts.silent && recorder.output) recorder.output.textContent = pretty(recorder.events);
        state.asrRecorder = null;
      }

      function updateAsrTranscriptSummary(payload) {
        const original = document.getElementById('asrOriginalText');
        const corrected = document.getElementById('asrCorrectedText');
        const stateLabel = document.getElementById('asrReplacementState');
        if (original) original.textContent = payload.originalText || payload.text || '-';
        if (corrected) corrected.textContent = payload.text || '-';
        if (stateLabel) stateLabel.textContent = payload.replacementApplied ? '已命中替换词' : '未命中';
      }

      function floatTo16kPcm(input, inputSampleRate) {
        const targetRate = 16000;
        const ratio = inputSampleRate / targetRate;
        const length = Math.max(0, Math.floor(input.length / ratio));
        const pcm = new Int16Array(length);
        for (let i = 0; i < length; i += 1) {
          const sample = input[Math.floor(i * ratio)] || 0;
          const clamped = Math.max(-1, Math.min(1, sample));
          pcm[i] = clamped < 0 ? clamped * 0x8000 : clamped * 0x7fff;
        }
        return pcm.buffer;
      }

      function runLlmWebSocket(text, options) {
        return new Promise((resolve, reject) => {
          const opts = options || {};
          const requestIds = makeRequestIds();
          const command = {
            type: 'llm.session.start',
            id: 'llm-session-' + Date.now(),
            payload: { deviceCode: state.deviceCode, text, requestId: requestIds.requestId, traceId: requestIds.traceId },
          };
          writeRequestDetail({ label: 'LLM WebSocket', method: 'WS', url: realtimeWsUrl(), path: '/ws/realtime/', headers: {}, body: command, note: '统一实时通信入口，llm.session.start 按 deviceCode 解析智能体，流式返回 llm.delta，完成时返回 llm.done。' });
          const socket = new WebSocket(realtimeWsUrl());
          state.sockets.push(socket);
          let answerText = '';
          let lastPayload = null;
          let settled = false;
          let timer = null;
          const refreshTimer = () => {
            if (timer) window.clearTimeout(timer);
            timer = window.setTimeout(() => {
              if (settled) return;
              settled = true;
              socket.close();
              reject(new Error('LLM WebSocket 30 秒内没有新内容'));
            }, 30000);
          };
          refreshTimer();
          socket.addEventListener('open', () => socket.send(JSON.stringify(command)));
          socket.addEventListener('message', (event) => {
            refreshTimer();
            const payload = parseJson(event.data) || {};
            writeResponse({ ok: true, status: 'WS', body: payload });
            if (payload.type === 'llm.started') {
              if (opts.onStarted) opts.onStarted(payload.payload || {});
            }
            if (payload.type === 'llm.delta') {
              const delta = String((payload.payload && payload.payload.text) || payload.text || '');
              answerText += delta;
              if (opts.onDelta) opts.onDelta(delta, payload);
            }
            if (payload.type === 'llm.done' || payload.type === 'llm.answer') {
              settled = true;
              window.clearTimeout(timer);
              lastPayload = payload.payload || {};
              if (!answerText) answerText = lastPayload.answerText || '';
              socket.close();
              resolve(Object.assign({}, lastPayload, { answerText }));
            }
            if (payload.type === 'llm.error' || payload.type === 'error') {
              settled = true;
              window.clearTimeout(timer);
              socket.close();
              reject(new Error((payload.error && payload.error.message) || payload.message || 'LLM WebSocket 失败'));
            }
          });
          socket.addEventListener('error', () => {
            settled = true;
            window.clearTimeout(timer);
            reject(new Error('LLM WebSocket 连接失败'));
          });
        });
      }

      function runTtsWebSocket(text, options) {
        return new Promise((resolve, reject) => {
          const opts = options || {};
          const output = opts.output;
          const audio = opts.audio || document.getElementById('ttsHttpAudio') || document.getElementById('llmAudio');
          const autoPlay = opts.autoPlay !== false;
          const payload = { deviceCode: state.deviceCode, text };
          if (opts.voiceId) payload.voiceId = opts.voiceId;
          const command = { type: 'tts.session.start', id: 'tts-session-' + Date.now(), payload };
          const events = [];
          const chunks = [];
          let sampleRate = 24000;
          let bytes = 0;
          let audioContext = autoPlay ? unlockTtsPlayback() : null;
          let nextStartTime = 0;

          writeRequestDetail({ label: opts.label || 'TTS WebSocket', method: 'WS', url: realtimeWsUrl(), path: '/ws/realtime/', headers: {}, body: command, note: '统一实时通信入口，tts.session.start 返回 tts.ready 后持续推送 audio/pcm 二进制分片，完成时返回 tts.done。' });
          const socket = new WebSocket(realtimeWsUrl());
          socket.binaryType = 'arraybuffer';
          state.sockets.push(socket);
          const timer = window.setTimeout(() => {
            socket.close();
            reject(new Error('TTS WebSocket 30 秒内未完成'));
          }, 30000);

          socket.addEventListener('open', () => {
            socket.send(JSON.stringify(command));
            events.push({ type: 'client.sent', command: command.type, id: command.id });
            if (output) output.textContent = pretty(events);
          });
          socket.addEventListener('message', async (event) => {
            if (typeof event.data === 'string') {
              const payload = parseJson(event.data) || {};
              events.push(payload);
              if (payload.type === 'tts.ready') {
                sampleRate = Number(payload.sampleRate || sampleRate);
                if (autoPlay) {
                  audioContext = audioContext || unlockTtsPlayback();
                  if (audioContext && audioContext.state === 'suspended') await audioContext.resume().catch(function () {});
                  nextStartTime = audioContext ? Math.max(audioContext.currentTime + 0.05, nextStartTime) : 0;
                }
              }
              if (payload.type === 'tts.done') {
                window.clearTimeout(timer);
                const wavBlob = pcmChunksToWavBlob(chunks, sampleRate);
                const objectUrl = audio ? attachAudioBlob(audio, wavBlob, false) : '';
                socket.close();
                resolve({ events, chunks: chunks.length, bytes, sampleRate, objectUrl });
              }
              if (payload.type === 'tts.error' || payload.type === 'error') {
                window.clearTimeout(timer);
                socket.close();
                reject(new Error(payload.message || 'TTS WebSocket 失败'));
              }
              if (output) output.textContent = pretty(events);
              writeResponse({ ok: true, status: 'WS', body: events });
              return;
            }

            const buffer = event.data instanceof ArrayBuffer ? event.data : await event.data.arrayBuffer();
            const chunk = new Uint8Array(buffer);
            chunks.push(chunk);
            bytes += chunk.byteLength;
            events.push({ type: 'tts.audio', bytes: chunk.byteLength });
            if (autoPlay) {
              audioContext = audioContext || unlockTtsPlayback();
              if (audioContext && audioContext.state === 'suspended') await audioContext.resume().catch(function () {});
              nextStartTime = playPcmChunk(audioContext, chunk, sampleRate, nextStartTime);
            }
            if (output) output.textContent = pretty(events);
          });
          socket.addEventListener('error', () => {
            window.clearTimeout(timer);
            reject(new Error('TTS WebSocket 连接失败'));
          });
          socket.addEventListener('close', () => {
            window.clearTimeout(timer);
          });
        });
      }

        return '<span class="code-chip">无</span>';
      }

      function attachBase64Audio(audio, payload, autoPlay) {
        const audioBase64 = payload && payload.audioBase64;
        if (!audioBase64) return;
        audio.src = 'data:' + (payload.audioContentType || 'audio/wav') + ';base64,' + audioBase64;
        audio.hidden = false;
        if (autoPlay !== false) audio.play().catch(function () {});
      }
      function playAudioBlob(audio, blob, autoPlay) {
        const url = attachAudioBlob(audio, blob, autoPlay);
        return url;
      }
      function attachAudioBlob(audio, blob, autoPlay) {
        const url = URL.createObjectURL(blob);
        audio.src = url;
        audio.hidden = false;
        if (autoPlay !== false) audio.play().catch(function () {});
        return url;
      }
      function unlockTtsPlayback() {
        state.ttsPlaybackContext = state.ttsPlaybackContext || createAudioContext();
        if (state.ttsPlaybackContext && state.ttsPlaybackContext.state === 'suspended') {
          state.ttsPlaybackContext.resume().catch(function () {});
        }
        return state.ttsPlaybackContext;
      }
      function typewriterText(element, text) {
        if (!element) return Promise.resolve();
        const content = String(text || '');
        element.textContent = '';
        if (!content) return Promise.resolve();
        return new Promise((resolve) => {
          let index = 0;
          const step = () => {
            index += 1;
            element.textContent = content.slice(0, index);
            if (index >= content.length) {
              resolve();
              return;
            }
            window.setTimeout(step, content.charCodeAt(index - 1) > 255 ? 36 : 22);
          };
          step();
        });
      }
      function createAudioContext() {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        return AudioContextCtor ? new AudioContextCtor() : null;
      }
      function closeAudioContext(audioContext) {
        if (audioContext && audioContext.state !== 'closed') audioContext.close().catch(function () {});
      }
      function playPcmChunk(audioContext, chunk, sampleRate, nextStartTime) {
        if (!audioContext || !chunk || !chunk.byteLength) return nextStartTime || 0;
        const samples = new Int16Array(chunk.buffer, chunk.byteOffset, Math.floor(chunk.byteLength / 2));
        const audioBuffer = audioContext.createBuffer(1, samples.length, sampleRate);
        const channel = audioBuffer.getChannelData(0);
        for (let i = 0; i < samples.length; i += 1) channel[i] = samples[i] / 32768;
        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioContext.destination);
        const startAt = Math.max(audioContext.currentTime + 0.02, nextStartTime || 0);
        source.start(startAt);
        return startAt + audioBuffer.duration;
      }
      function pcmChunksToWavBlob(chunks, sampleRate) {
        const bytes = chunks.reduce((total, chunk) => total + chunk.byteLength, 0);
        const wav = new ArrayBuffer(44 + bytes);
        const view = new DataView(wav);
        writeAscii(view, 0, 'RIFF');
        view.setUint32(4, 36 + bytes, true);
        writeAscii(view, 8, 'WAVE');
        writeAscii(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeAscii(view, 36, 'data');
        view.setUint32(40, bytes, true);
        let offset = 44;
        for (const chunk of chunks) {
          new Uint8Array(wav, offset, chunk.byteLength).set(chunk);
          offset += chunk.byteLength;
        }
        return new Blob([wav], { type: 'audio/wav' });
      }
      function writeAscii(view, offset, text) {
        for (let i = 0; i < text.length; i += 1) view.setUint8(offset + i, text.charCodeAt(i));
      }
      function realtimeWsUrl() {
        const api = new URL(state.apiBaseUrl);
        return (api.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + api.host + '/ws/realtime/';
      }
      function normalizeApiBase(value) { return String(value || DEFAULT_API_BASE).trim().replace(/\/+$/, ''); }
      function makeRequestIds() {
        const suffix = Date.now().toString(36) + '-' + Math.random().toString(16).slice(2, 8);
        return { requestId: 'req-' + suffix, traceId: 'trace-' + suffix };
      }
      function unwrap(payload) {
        const body = payload && payload.body !== undefined ? payload.body : payload;
        return body && typeof body === 'object' && body.data !== undefined ? body.data : body;
      }
      function extractErrorMessage(body, status) {
        if (body && typeof body === 'object') return body.message || body.detail || JSON.stringify(body);
        return body ? String(body) : '请求失败：HTTP ' + status;
      }
      function maybeJson(value) {
        return typeof value === 'string' ? (parseJson(value) || value) : value;
      }
      function parseJson(value) {
        try { return JSON.parse(value); } catch (_) { return null; }
      }
      function pretty(value) { return JSON.stringify(value, null, 2); }
      function code(value) { return '<span class="code-chip">' + escapeHtml(value == null || value === '' ? '-' : String(value)) + '</span>'; }
      function linkOrDash(url) { return url ? '<a class="code-chip" href="' + escapeAttr(url) + '" target="_blank" rel="noreferrer">' + escapeHtml(url) + '</a>' : '-'; }
      function setStatus(message, tone) {
        els.statusPill.textContent = message;
        els.statusPill.className = 'status-pill ' + (tone || '');
      }
      function showError(error) {
        setStatus(error.message || String(error), 'error');
        els.contentBody.innerHTML = '<div class="empty">' + escapeHtml(error.message || String(error)) + '</div>';
      }
      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
      }
      function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#39;'); }
    })();
  </script>
