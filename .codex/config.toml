# oh-my-codex top-level settings (must be before any [table])
model_reasoning_effort = "medium"
developer_instructions = "You have oh-my-codex installed. AGENTS.md is the orchestration brain and main control surface. Follow AGENTS.md for skill/keyword routing, $name workflow invocation, and role-specialized subagents; when spawning native subagents, set `agent_type` to an installed role and never omit it for OMX work. Use outcome-first, concise progress updates: state the target result, constraints, validation evidence, and stop condition before adding process detail. Native subagents live in .codex/agents and may handle independent parallel subtasks within one Codex session or team pane. Skills load from .codex/skills, not native-agent TOMLs. Treat installed prompts as narrower execution surfaces under AGENTS.md authority."
model = "gpt-5.5"
# oh-my-codex seeded behavioral defaults (uninstall removes unchanged defaults)
model_context_window = 250000
model_auto_compact_token_limit = 200000
# End oh-my-codex seeded behavioral defaults

[features]
multi_agent = true
child_agents_md = true
hooks = true
goals = true

[shell_environment_policy.set]
USE_OMX_EXPLORE_CMD = "0"

[agents]
max_threads = 6
max_depth = 2

