<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Skills 参考手册 | Agent 技能库与指引</title>
<meta name="description" content="包含 31 个 AI Agent 核心技能的交互式参考手册与使用指南，覆盖代码审查、架构设计、Bug 诊断、Git 规范及 Trellis 工作流。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root[data-theme="dark"] {
    --bg-main: #0b0f19;
    --bg-sidebar: #111827;
    --bg-header: rgba(17, 24, 39, 0.85);
    --bg-card: #1f293d;
    --bg-card-hover: #26334d;
    --bg-card-subtle: #161e2e;
    --bg-input: #161f30;
    --border-color: #2d3748;
    --border-light: rgba(255, 255, 255, 0.08);
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    --brand: #0d9488;
    --brand-light: #14b8a6;
    --brand-dark: #0f766e;
    --brand-gradient: linear-gradient(135deg, #0d9488 0%, #6366f1 100%);
    --brand-glow: rgba(13, 148, 136, 0.25);
    --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
    --tag-coding-bg: rgba(59, 130, 246, 0.15);
    --tag-coding-text: #60a5fa;
    --tag-design-bg: rgba(139, 92, 246, 0.15);
    --tag-design-text: #a78bfa;
    --tag-debug-bg: rgba(244, 63, 94, 0.15);
    --tag-debug-text: #fb7185;
    --tag-workflow-bg: rgba(245, 158, 11, 0.15);
    --tag-workflow-text: #fbbf24;
    --tag-ux-bg: rgba(236, 72, 153, 0.15);
    --tag-ux-text: #f472b6;
    --tag-git-bg: rgba(16, 185, 129, 0.15);
    --tag-git-text: #34d399;
    --tag-research-bg: rgba(99, 102, 241, 0.15);
    --tag-research-text: #818cf8;
    --code-bg: #151c2c;
    --code-text: #e2e8f0;
  }

  :root[data-theme="light"] {
    --bg-main: #f8fafc;
    --bg-sidebar: #ffffff;
    --bg-header: rgba(255, 255, 255, 0.85);
    --bg-card: #ffffff;
    --bg-card-hover: #f1f5f9;
    --bg-card-subtle: #f8fafc;
    --bg-input: #f1f5f9;
    --border-color: #e2e8f0;
    --border-light: rgba(0, 0, 0, 0.06);
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --brand: #0f766e;
    --brand-light: #14b8a6;
    --brand-dark: #0d9488;
    --brand-gradient: linear-gradient(135deg, #0f766e 0%, #4f46e5 100%);
    --brand-glow: rgba(15, 118, 110, 0.15);
    --card-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 6px -1px rgba(0, 0, 0, 0.04);
    --tag-coding-bg: #dbeafe;
    --tag-coding-text: #1e40af;
    --tag-design-bg: #ede9fe;
    --tag-design-text: #5b21b6;
    --tag-debug-bg: #fee2e2;
    --tag-debug-text: #991b1b;
    --tag-workflow-bg: #fef3c7;
    --tag-workflow-text: #92400e;
    --tag-ux-bg: #fce7f3;
    --tag-ux-text: #9d174d;
    --tag-git-bg: #d1fae5;
    --tag-git-text: #065f46;
    --tag-research-bg: #e0e7ff;
    --tag-research-text: #3730a3;
    --code-bg: #1e293b;
    --code-text: #e2e8f0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  html {
    font-size: clamp(13px, 0.52vw + 9px, 16px);
    scroll-behavior: smooth;
  }
  
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text-primary);
    background: var(--bg-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.6;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  /* Top Navigation Bar */
  .top-header {
    height: 60px;
    background: var(--bg-header);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--brand-gradient);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 12px var(--brand-glow);
  }
  .logo-title {
    font-weight: 800;
    font-size: 1.15rem;
    background: var(--brand-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  .logo-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--brand-glow);
    color: var(--brand-light);
    border: 1px solid var(--brand-light);
    font-weight: 600;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cmd-search-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 36px;
    padding: 0 14px;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    box-sizing: border-box;
  }
  .cmd-search-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    flex-shrink: 0;
  }
  .cmd-search-btn:hover {
    border-color: var(--brand-light);
    color: var(--text-primary);
    background: var(--bg-card-hover);
    box-shadow: 0 0 12px var(--brand-glow);
  }
  .cmd-kbd {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    padding: 2px 6px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-family: 'Fira Code', monospace;
    color: var(--brand-light);
    font-weight: 600;
    line-height: 1;
  }

  .theme-toggle-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background: var(--bg-input);
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .theme-toggle-btn:hover {
    border-color: var(--brand-light);
    color: var(--brand-light);
    background: var(--bg-card-hover);
    transform: scale(1.05);
  }

  .mobile-menu-toggle {
    display: none;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background: var(--bg-input);
    color: var(--text-primary);
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* Main Container Layout */
  .app-layout {
    display: flex;
    flex: 1;
    height: calc(100vh - 60px);
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    height: 100%;
    transition: transform 0.3s ease;
    z-index: 40;
  }
  .sidebar-header-box {
    padding: 16px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sidebar-search-box {
    position: relative;
  }
  .sidebar-search-box input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 0.85rem;
    outline: none;
    transition: all 0.2s ease;
  }
  .sidebar-search-box input:focus {
    border-color: var(--brand-light);
    box-shadow: 0 0 0 3px var(--brand-glow);
  }
  .sidebar-search-box svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: var(--text-muted);
  }

  .sidebar-tools-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-secondary);
  }
  .sidebar-tools-btn {
    background: none;
    border: none;
    color: var(--brand-light);
    font-size: 0.75rem;
    cursor: pointer;
    font-weight: 600;
  }
  .sidebar-tools-btn:hover {
    text-decoration: underline;
  }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .sidebar-scroll::-webkit-scrollbar { width: 5px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

  /* Accordion Groups */
  .group {
    margin-bottom: 8px;
    border-radius: 8px;
    overflow: hidden;
  }
  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    border-radius: 6px;
    transition: all 0.2s ease;
  }
  .group-header:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
  }
  .group-title-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-count-badge {
    font-size: 0.7rem;
    background: var(--bg-input);
    padding: 1px 7px;
    border-radius: 10px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .group-arrow {
    width: 14px;
    height: 14px;
    stroke: var(--text-muted);
    transition: transform 0.2s ease;
  }
  .group-header.collapsed .group-arrow {
    transform: rotate(-90deg);
  }

  .group-items {
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  .group-items.hidden {
    max-height: 0 !important;
  }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px 8px 24px;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 6px;
    margin: 2px 0;
    color: var(--text-secondary);
    text-decoration: none;
    transition: all 0.15s ease;
    position: relative;
  }
  .nav-item:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
  }
  .nav-item.active {
    background: var(--brand-glow);
    color: var(--brand-light);
    font-weight: 700;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 16px;
    background: var(--brand-light);
    border-radius: 2px;
  }
  .nav-item .desc-sub {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 400;
    max-width: 120px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Main Content Area */
  .main-content {
    flex: 1;
    padding: 32px 48px;
    overflow-y: auto;
    height: 100%;
    background: var(--bg-main);
  }
  .main-content::-webkit-scrollbar { width: 6px; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

  /* Skill Card View */
  .skill-card {
    display: none;
    animation: fadeInUp 0.3s ease forwards;
    max-width: 1000px;
    margin: 0 auto 40px;
  }
  .skill-card.active {
    display: block;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Skill Header Banner */
  .skill-hero-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: var(--card-shadow);
    position: relative;
    overflow: hidden;
  }
  .skill-hero-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--brand-gradient);
  }

  .breadcrumb {
    font-size: 0.78rem;
    color: var(--brand-light);
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .skill-title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 6px;
  }
  .skill-title {
    font-size: clamp(22px, 1.2vw + 16px, 32px);
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  .skill-en-code {
    font-family: 'Fira Code', monospace;
    font-size: 0.88rem;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--brand-light);
    padding: 3px 10px;
    border-radius: 6px;
  }
  .skill-desc-text {
    font-size: 0.98rem;
    color: var(--text-secondary);
    margin: 12px 0 16px;
    line-height: 1.7;
  }
  
  .tags-flex {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tag-pill {
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .tag-coding { background: var(--tag-coding-bg); color: var(--tag-coding-text); }
  .tag-design { background: var(--tag-design-bg); color: var(--tag-design-text); }
  .tag-debug { background: var(--tag-debug-bg); color: var(--tag-debug-text); }
  .tag-workflow { background: var(--tag-workflow-bg); color: var(--tag-workflow-text); }
  .tag-ux { background: var(--tag-ux-bg); color: var(--tag-ux-text); }
  .tag-git { background: var(--tag-git-bg); color: var(--tag-git-text); }
  .tag-research { background: var(--tag-research-bg); color: var(--tag-research-text); }

  .hero-actions-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border-light);
    flex-wrap: wrap;
  }
  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid transparent;
  }
  .action-btn-primary {
    background: var(--brand-gradient);
    color: #ffffff;
    box-shadow: 0 4px 14px var(--brand-glow);
  }
  .action-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--brand-glow);
    filter: brightness(1.08);
  }
  .action-btn-secondary {
    background: var(--bg-input);
    border-color: var(--border-color);
    color: var(--text-primary);
  }
  .action-btn-secondary:hover {
    border-color: var(--brand-light);
    color: var(--brand-light);
    background: var(--bg-card-hover);
    transform: translateY(-1px);
  }
  .action-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }

  /* Content Sections */
  .section-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: var(--card-shadow);
  }
  .section-card h3 {
    font-size: clamp(14px, 0.52vw + 10px, 18px);
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-light);
  }
  .section-card h3 svg {
    width: 20px;
    height: 20px;
    stroke: var(--brand-light);
    fill: none;
  }

  .trigger-box {
    background: var(--bg-card-subtle);
    border: 1px solid var(--border-color);
    border-left: 4px solid var(--brand-light);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 0.92rem;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  /* List Styling */
  .custom-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .custom-list li {
    position: relative;
    padding-left: 24px;
    font-size: 0.92rem;
    color: var(--text-primary);
    line-height: 1.6;
  }
  .custom-list li::before {
    content: '✓';
    position: absolute;
    left: 0;
    top: 2px;
    color: var(--brand-light);
    font-weight: 800;
    font-size: 0.85rem;
  }

  /* Timeline Step List */
  .step-timeline {
    list-style: none;
    position: relative;
    padding-left: 32px;
  }
  .step-timeline::before {
    content: '';
    position: absolute;
    left: 13px;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: var(--border-color);
  }
  .step-timeline li {
    position: relative;
    margin-bottom: 16px;
    font-size: 0.92rem;
    color: var(--text-primary);
    line-height: 1.6;
  }
  .step-timeline li:last-child { margin-bottom: 0; }
  .step-number-badge {
    position: absolute;
    left: -32px;
    top: 1px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--brand-gradient);
    color: #ffffff;
    font-size: 0.75rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 8px var(--brand-glow);
  }

  /* Tips & Alerts */
  .tips-callout {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.25);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .tips-callout h4 {
    color: #f59e0b;
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Tables & Data Grid */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 0.88rem;
  }
  .data-table th {
    text-align: left;
    padding: 10px 14px;
    background: var(--bg-card-subtle);
    color: var(--brand-light);
    font-weight: 700;
    border-bottom: 2px solid var(--border-color);
  }
  .data-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-light);
    color: var(--text-primary);
    vertical-align: top;
  }
  .data-table tr:hover td {
    background: var(--bg-card-hover);
  }

  /* Welcome Screen */
  .welcome-hero {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: var(--card-shadow);
    max-width: 960px;
    margin: 20px auto 40px;
    position: relative;
    overflow: hidden;
  }
  .welcome-hero h2 {
    font-size: clamp(24px, 1.5vw + 18px, 38px);
    font-weight: 800;
    margin-bottom: 12px;
    background: var(--brand-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .welcome-hero p {
    font-size: 1.05rem;
    color: var(--text-secondary);
    max-width: 580px;
    margin: 0 auto 28px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }
  .stat-card {
    background: var(--bg-card-subtle);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
    transition: transform 0.2s ease;
  }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-num {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--brand-light);
    font-family: 'Fira Code', monospace;
  }
  .stat-label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 4px;
    font-weight: 600;
  }

  .category-discovery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-top: 32px;
    text-align: left;
  }
  .category-card {

// ---- App Logic & Rendering ----
function renderSidebar() {
  const container = document.getElementById('sidebarScroll');
  let html = '';
  groups.forEach((g, gi) => {
    html += `<div class="group" data-group="${gi}">
      <div class="group-header" onclick="toggleGroup(${gi})">
        <div class="group-title-wrap">
          <span>${g.name}</span>
          <span class="group-count-badge">${g.items.length}</span>
        </div>
        <svg class="group-arrow" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="group-items" id="group-items-${gi}">`;
    
    g.items.forEach(s => {
      html += `<a class="nav-item" data-skill="${s.id}" onclick="showSkill('${s.id}')">
        <span>${s.label}</span>
        <span class="desc-sub">${s.desc}</span>
      </a>`;
    });
    
    html += `</div></div>`;
  });
  container.innerHTML = html;
  
  // Set default scrollHeight for opened groups
  setTimeout(() => {
    document.querySelectorAll('.group-items').forEach(el => {
      el.style.maxHeight = el.scrollHeight + 'px';
    });
  }, 50);
}

function renderCategoryDiscovery() {
  const grid = document.getElementById('categoryGrid');
  let html = '';
  groups.forEach((g, gi) => {
    html += `<div class="category-card" onclick="focusCategory(${gi})">
      <div class="cat-card-header">
        <div class="cat-card-title">${g.name}</div>
        <div class="cat-card-count">${g.items.length} 个技能</div>
      </div>
      <div style="font-size:0.8rem; color:var(--text-secondary)">
        包含: ${g.items.map(i => i.label).slice(0, 3).join(', ')}${g.items.length > 3 ? '...' : ''}
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

function toggleGroup(gi) {
  const header = document.querySelectorAll('.group-header')[gi];
  const items = document.getElementById(`group-items-${gi}`);
  if (items.classList.contains('hidden')) {
    items.classList.remove('hidden');
    items.style.maxHeight = items.scrollHeight + 'px';
    header.classList.remove('collapsed');
  } else {
    items.classList.add('hidden');
    items.style.maxHeight = '0';
    header.classList.add('collapsed');
  }
}

let allExpanded = true;
function toggleAllGroups() {
  allExpanded = !allExpanded;
  groups.forEach((_, gi) => {
    const header = document.querySelectorAll('.group-header')[gi];
    const items = document.getElementById(`group-items-${gi}`);
    if (allExpanded) {
      items.classList.remove('hidden');
      items.style.maxHeight = items.scrollHeight + 'px';
      header.classList.remove('collapsed');
    } else {
      items.classList.add('hidden');
      items.style.maxHeight = '0';
      header.classList.add('collapsed');
    }
  });
}

function focusCategory(gi) {
  groups.forEach((_, index) => {
    const items = document.getElementById(`group-items-${index}`);
    const header = document.querySelectorAll('.group-header')[index];
    if (index === gi) {
      items.classList.remove('hidden');
      items.style.maxHeight = items.scrollHeight + 'px';
      header.classList.remove('collapsed');
      if (groups[gi].items.length > 0) {
        showSkill(groups[gi].items[0].id);
      }
    }
  });
}

function showWelcome() {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('active'));
  document.getElementById('welcome').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showSkill(id) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('active'));

  const navItem = document.querySelector(`.nav-item[data-skill="${id}"]`);
  if (navItem) navItem.classList.add('active');

  let card = document.getElementById(`card-${id}`);
  if (!card) {
    card = renderSkillCard(id);
    document.getElementById('mainContent').appendChild(card);
  }
  card.classList.add('active');
  document.getElementById('mainContent').scrollTo({ top: 0, behavior: 'smooth' });
}

function renderSkillCard(id) {
  const s = skills[id];
  if (!s) return;

  const card = document.createElement('div');
  card.id = `card-${id}`;
  card.className = 'skill-card';

  const tagsHTML = (s.tags || []).map(t => `<span class="tag-pill ${s.tagClass || 'tag-coding'}">#${t}</span>`).join('');

  card.innerHTML = `
    <div class="skill-hero-card">
      <div class="breadcrumb">
        <span>Skills Reference</span> / <span>${s.name}</span>
      </div>
      <div class="skill-title-row">
        <h1 class="skill-title">${s.name}</h1>
        <span class="skill-en-code">${s.nameEn}</span>
      </div>
      <div class="tags-flex">${tagsHTML}</div>
      <div class="skill-desc-text">${s.desc}</div>

      <div class="hero-actions-row">
        ${s.trigger ? `<button class="action-btn action-btn-primary" onclick="copyText('${escapeJsString(s.trigger)}', '触发条件已复制')">
          <svg viewBox="0 0 24 24" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          复制触发词

        <button class="action-btn action-btn-secondary" onclick="copyText('${s.nameEn}', 'Skill ID 已复制')">
          <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          复制 Skill ID

    </div>

    ${s.trigger ? `
      <div class="section-card">
        <h3>
          <svg viewBox="0 0 24 24" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>

    ${s.useWhen ? `
      <div class="section-card">
        <h3>
          <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>

    ${s.howToUse ? `
      <div class="section-card">
        <h3>
          <svg viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
          📋 操作步骤与流程
        </h3>
        <ol class="step-timeline">
          ${s.howToUse.map((item, idx) => `
            <li>
              <span class="step-number-badge">${idx + 1}</span>
              <div>${item}</div>
            </li>
          `).join('')}
        </ol>
      </div>
    ` : ''}

    ${s.keyProcess ? renderCustomSection('🔑 关键流程与判定', s.keyProcess) : ''}
    ${s.whyTwoAxes ? renderCustomSection('⚖️ 为什么双轴审查', [s.whyTwoAxes]) : ''}
    ${s.testability ? renderCustomSection('🧪 可测试性设计标准', s.testability) : ''}
    ${s.designConstraints ? renderCustomSection('📐 设计约束维度', s.designConstraints) : ''}
    ${s.feedbackLoop ? renderCustomSection('🔄 反馈回路构建手段', s.feedbackLoop) : ''}
    ${s.rootCauseCategories ? renderCustomSection('🔍 根因五大分类', s.rootCauseCategories) : ''}
    ${s.auditModes ? renderCustomSection('🛡️ 支持的审计模式', s.auditModes) : ''}

    ${s.routing ? renderCustomSection('🔀 路由分类规则', s.routing) : ''}
    ${s.statusRouting ? renderCustomSection('📊 任务状态路由映射', s.statusRouting) : ''}
    ${s.mandatoryTrigger ? renderCustomSection('⚡ Code-Spec 强制触发条件', s.mandatoryTrigger) : ''}
    ${s.mandatoryOutput7 ? renderCustomSection('📄 Code-Spec 7 段式强制输出', s.mandatoryOutput7) : ''}
    ${s.scope ? renderCustomSection('🌐 作用域分布', s.scope) : ''}
    ${s.whenToUse ? renderCustomSection('💡 何时启用记忆检索', s.whenToUse) : ''}
    ${s.whenNotToUse ? renderCustomSection('⛔ 何时不建议检索', s.whenNotToUse) : ''}
    ${s.doneCriteria ? renderCustomSection('✅ 验证完成标准', s.doneCriteria) : ''}
    ${s.priorityRules ? renderCustomSection('🏆 UI/UX 优先级原则', s.priorityRules) : ''}
    ${s.artifacts ? renderCustomSection('📦 生成的 Artifacts 产物', s.artifacts) : ''}
    ${s.questionRules ? renderCustomSection('❓ 提问规范', s.questionRules) : ''}

    ${s.tips ? `
      <div class="section-card tips-callout">
        <h4>💡 专家提示与核心注意 (Tips)</h4>
        <ul class="custom-list">
          ${s.tips.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>

  return card;
}

function renderCustomSection(title, items) {
  return `
    <div class="section-card">
      <h3>${title}</h3>
      <ul class="custom-list">
        ${items.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
  `;
}

function escapeJsString(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// ---- Search & Filter ----
function filterSkills(q) {
  const term = q.toLowerCase().trim();
  document.querySelectorAll('.nav-item').forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = (!term || text.includes(term)) ? 'flex' : 'none';
  });

  groups.forEach((_, gi) => {
    const groupEl = document.querySelector(`.group[data-group="${gi}"]`);
    const visibleCount = Array.from(groupEl.querySelectorAll('.nav-item')).filter(i => i.style.display !== 'none').length;
    groupEl.style.display = visibleCount > 0 ? '' : 'none';
    if (term && visibleCount > 0) {
      const items = document.getElementById(`group-items-${gi}`);
      const header = document.querySelectorAll('.group-header')[gi];
      items.classList.remove('hidden');
      items.style.maxHeight = items.scrollHeight + 'px';
      header.classList.remove('collapsed');
    }
  });
}

// ---- Command Palette Modal ----
function openCmdModal() {
  const modal = document.getElementById('cmdModal');
  modal.classList.add('active');
  const input = document.getElementById('cmdInput');
  input.value = '';
  input.focus();
  searchCmdModal('');
}

function closeCmdModal() {
  document.getElementById('cmdModal').classList.remove('active');
}

function closeCmdModalOnBackdrop(e) {
  if (e.target.id === 'cmdModal') closeCmdModal();
}

function searchCmdModal(q) {
  const term = q.toLowerCase().trim();
  const resultsContainer = document.getElementById('cmdResults');
  let matches = [];

  Object.keys(skills).forEach(id => {
    const s = skills[id];
    const matchScore = (s.name.toLowerCase().includes(term) ? 2 : 0) + 
                       (s.nameEn.toLowerCase().includes(term) ? 2 : 0) + 
                       (s.desc.toLowerCase().includes(term) ? 1 : 0);
    if (!term || matchScore > 0) {
      matches.push(s);
    }
  });

  if (matches.length === 0) {
    resultsContainer.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-muted)">未找到相关 Skill</div>`;
    return;
  }

  resultsContainer.innerHTML = matches.map(s => `
    <div class="cmd-result-item" onclick="selectCmdResult('${s.nameEn}')">
      <div class="cmd-result-left">
        <div class="item-title">
          <span>${s.name}</span>
          <span class="item-id">${s.nameEn}</span>
        </div>
        <div class="item-sub">${s.desc}</div>
      </div>
      <div class="cmd-result-action">
        <span>查看</span>
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </div>
    </div>
  `).join('');
}

function selectCmdResult(id) {
  closeCmdModal();
  showSkill(id);
}

// Global Keyboard Shortcuts
window.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openCmdModal();
  } else if (e.key === 'Escape') {
    closeCmdModal();
  }
});

// Toast System
function copyText(text, msg = '已复制到剪贴板') {
  navigator.clipboard.writeText(text).then(() => {
    showToast(msg);
  }).catch(() => {
    showToast('复制失败');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2200);
}

// Theme System
function updateThemeIcon(theme) {
  const btn = document.getElementById('themeBtn');
  if (!btn) return;
  if (theme === 'dark') {
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
  } else {
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
  }
}

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  updateThemeIcon(next);
  localStorage.setItem('theme', next);
}

// Load Theme preference
(function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon(saved);
})();

// Init App
renderSidebar();
renderCategoryDiscovery();
</script>

</html>
