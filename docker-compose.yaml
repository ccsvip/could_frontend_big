x-backend-build: &backend-build
  context: ./backend
  args:
    # 基础镜像默认走可配置镜像源，避免 Docker Hub 在受限网络下拉取超时。
    PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.13}
    # Linux 服务器默认使用国内 Debian 镜像；如需切换可在根目录 .env 配置 APT_MIRROR / APT_SECURITY_MIRROR。
    APT_MIRROR: ${APT_MIRROR:-https://mirrors.aliyun.com/debian}
    APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
    # Python 依赖默认使用国内 PyPI 镜像；如需切换可在根目录 .env 配置 PIP_INDEX_URL。
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}

services:
  # 所有服务统一使用 always 重启策略，确保 Docker 或宿主机重启后自动恢复。
  db:
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    container_name: solin_db
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-postgres}\" -d \"$${POSTGRES_DB:-postgres}\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7-alpine}
    container_name: solin_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  backend:
    build: *backend-build
    container_name: solin_backend
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python manage.py migrate && python manage.py seed_operations_periodic_tasks && python manage.py collectstatic --noinput && python manage.py shell -c \"from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'admin@example.com', 'admin123456')\" && python manage.py seed_devices && uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --lifespan off"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('127.0.0.1', 8000), 2); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  celery_worker:
    build: *backend-build
    container_name: solin_celery_worker
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python manage.py migrate --check && celery -A config worker -l info"

  celery_beat:
    build: *backend-build
    env_file:
      - ./backend/.env
    container_name: solin_celery_beat
    restart: always
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python wait_for_db.py && python manage.py migrate --check && celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"

  web:
    build:
      context: ./web
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
    env_file:
      - ./web/.env
    container_name: solin_web
    restart: always
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "${WEB_PORT}:5173"
    depends_on:
      backend:
        condition: service_healthy
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  nginx:
    image: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
    container_name: solin_nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conai.chat.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_DIR:-./26179784_conai.chat_other}:/etc/nginx/certs:ro
    depends_on:
      - web

volumes:
  postgres_data:
