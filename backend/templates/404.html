<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - 页面未找到</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 星空背景 */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) infinite ease-in-out;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* 404 大字 */
    .glitch {
      font-size: clamp(100px, 22vw, 220px);
      font-weight: 900;
      color: #fff;
      position: relative;
      line-height: 1;
      letter-spacing: -4px;
      text-shadow:
        0 0 10px rgba(130, 80, 255, 0.8),
        0 0 40px rgba(130, 80, 255, 0.5),
        0 0 80px rgba(130, 80, 255, 0.3);
      animation: glitch 3s infinite;
    }

    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .glitch::before {
      color: #ff4d9e;
      animation: glitch-before 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }

    .glitch::after {
      color: #4dffd2;
      animation: glitch-after 3s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-3px, 1px); }
      94% { transform: translate(3px, -1px); }
      96% { transform: translate(-2px, 2px); }
      98% { transform: translate(2px, -2px); }
    }

    @keyframes glitch-before {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92% { transform: translate(-6px, 0); opacity: 0.7; }
      94% { transform: translate(6px, 0); opacity: 0.7; }
      96% { transform: translate(-4px, 0); opacity: 0.7; }
      98% { transform: translate(4px, 0); opacity: 0.5; }
    }

    @keyframes glitch-after {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92% { transform: translate(6px, 0); opacity: 0.7; }
      94% { transform: translate(-6px, 0); opacity: 0.7; }
      96% { transform: translate(4px, 0); opacity: 0.7; }
      98% { transform: translate(-4px, 0); opacity: 0.5; }
    }

    /* 宇航员 */
    .astronaut {
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(130, 80, 255, 0.6));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    /* 光晕圆圈 */
    .glow-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.15; }
      50% { transform: scale(1.2); opacity: 0.25; }
    }
  </style>
</head>
<body>

  <!-- 星空 -->
  <div class="stars" id="stars"></div>

  <!-- 光晕装饰 -->
  <div class="glow-circle" style="width:500px;height:500px;background:#8250ff;top:-100px;left:-100px;"></div>
  <div class="glow-circle" style="width:400px;height:400px;background:#ff4d9e;bottom:-80px;right:-80px;animation-delay:3s;"></div>

  <!-- 主内容 -->
  <div class="relative z-10 flex flex-col items-center justify-center text-center px-6 py-10 select-none">

    <!-- 宇航员 SVG -->
    <div class="astronaut mb-2" style="width: clamp(80px, 14vw, 130px);">
      <svg viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 背包 -->
        <rect x="70" y="110" width="60" height="70" rx="12" fill="#c0c8e8"/>
        <rect x="80" y="118" width="40" height="50" rx="8" fill="#a0aad0"/>
        <rect x="88" y="128" width="24" height="6" rx="3" fill="#8250ff" opacity="0.8"/>
        <rect x="88" y="140" width="24" height="6" rx="3" fill="#ff4d9e" opacity="0.8"/>
        <!-- 身体 -->
        <rect x="60" y="100" width="80" height="85" rx="20" fill="#dde3f5"/>
        <!-- 头盔外壳 -->
        <circle cx="100" cy="72" r="45" fill="#dde3f5"/>
        <!-- 头盔玻璃 -->
        <circle cx="100" cy="72" r="33" fill="#1a1a4e"/>
        <circle cx="100" cy="72" r="33" fill="url(#visorGrad)"/>
        <!-- 反光 -->
        <ellipse cx="88" cy="60" rx="10" ry="7" fill="rgba(255,255,255,0.2)" transform="rotate(-20 88 60)"/>
        <!-- 眼睛/表情 -->
        <circle cx="89" cy="70" r="5" fill="#4dffd2"/>
        <circle cx="111" cy="70" r="5" fill="#4dffd2"/>
        <path d="M 88 82 Q 100 90 112 82" stroke="#4dffd2" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <!-- 头盔边框 -->
        <circle cx="100" cy="72" r="45" stroke="#a0aad0" stroke-width="4" fill="none"/>
        <!-- 左臂 -->
        <rect x="28" y="105" width="36" height="18" rx="9" fill="#dde3f5" transform="rotate(30 28 105)"/>
        <circle cx="22" cy="135" r="10" fill="#c0c8e8"/>
        <!-- 右臂 -->
        <rect x="136" y="105" width="36" height="18" rx="9" fill="#dde3f5" transform="rotate(-30 172 105)"/>
        <circle cx="178" cy="135" r="10" fill="#c0c8e8"/>
        <!-- 左腿 -->
        <rect x="72" y="172" width="22" height="36" rx="11" fill="#c0c8e8"/>
        <rect x="68" y="200" width="28" height="14" rx="8" fill="#a0aad0"/>
        <!-- 右腿 -->
        <rect x="106" y="172" width="22" height="36" rx="11" fill="#c0c8e8"/>
        <rect x="104" y="200" width="28" height="14" rx="8" fill="#a0aad0"/>
        <!-- 徽章 -->
        <circle cx="100" cy="130" r="10" fill="#8250ff" opacity="0.9"/>
        <text x="100" y="134" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">★</text>
        <defs>
          <radialGradient id="visorGrad" cx="40%" cy="35%">
            <stop offset="0%" stop-color="#3a3a8e"/>
            <stop offset="100%" stop-color="#0d0d2b"/>
          </radialGradient>
        </defs>
      </svg>
    </div>

    <!-- 404 -->
    <div class="glitch">404</div>

    <!-- 标题 -->
    <h1 class="text-white font-bold mt-4 mb-3" style="font-size: clamp(18px, 4vw, 28px); letter-spacing: 2px;">
      迷失在宇宙中...
    </h1>

    <!-- 描述 -->
    <p class="mb-2" style="color: rgba(255,255,255,0.55); font-size: clamp(13px, 2vw, 16px); max-width: 360px; line-height: 1.8;">
      你访问的页面已经漂离轨道，<br/>或者从未在这个星系存在过。
    </p>


  </div>

  <script>
    // 生成星空
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      const size = Math.random() * 2.5 + 0.5;
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        --dur: ${(Math.random() * 4 + 2).toFixed(1)}s;
        animation-delay: ${(Math.random() * 5).toFixed(1)}s;
      `;
      starsContainer.appendChild(star);
    }

    // 显示当前路径
    document.getElementById('currentPath').textContent = '📍 ' + (window.location.pathname || '/404');
  </script>
</body>
</html>
